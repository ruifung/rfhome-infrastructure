---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: reflector-chart
  namespace: flux-system
spec:
  interval: 24h
  url: oci://harbor.services.home.yrf.me/ghcr/emberstack/helm-charts/reflector
  ref:
    tag: 10.0.29
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: flux-system
spec:
  chartRef:
    kind: OCIRepository
    name: reflector-chart
  interval: 15m
  targetNamespace: kube-system
  values:
    priorityClassName: rfhome-high-priority
    nodeSelector:
      kubernetes.io/os: linux
      location: rfhome
