---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: newt-chart
  namespace: traefik
spec:
  interval: 24h
  url: oci://harbor.services.home.yrf.me/chartproxy/charts.fossorial.io/newt
  ref:
    tag: 1.2.0
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
  namespace: traefik
spec:
  chartRef:
    kind: OCIRepository
    name: newt-chart
  interval: 15m
  timeout: 1h
  install:
    createNamespace: false
    skipCRDs: true
  # upgrade:
  # disableWait: true
  # disableWaitForJobs: true
  postRenderers:
  # These patches remove the helm.sh/chart label to prevent the helm chart
  # from rendering invalid label values due to Flux appending the chart digest.
  - kustomize:
      patches:
      - patch: |
          - op: "remove"
            path: "/metadata/labels/helm.sh~1chart"
        target:
          labelSelector: "helm.sh/chart"
  driftDetection:
    mode: enabled
  values:
    global:
      image:
        registry: docker.io
        repository: fosrl/newt
        tag: 1.10.3
    newtInstances:
    - name: pathweb-newt
      enabled: true
      auth:
        existingSecretName: pathweb-newt-secret
