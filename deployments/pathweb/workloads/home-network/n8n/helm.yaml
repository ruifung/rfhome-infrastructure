---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: n8n-chart
  namespace: flux-system
spec:
  interval: 24h
  url: oci://ghcr.io/n8n-io/n8n-helm-chart/n8n
  ref:
    tag: 1.4.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: flux-system
spec:
  releaseName: n8n
  chartRef:
    kind: OCIRepository
    name: n8n-chart
  interval: 15m
  targetNamespace: home-network
  install:
    createNamespace: true
  valuesFrom:
  - kind: Secret
    name: rfhome-postgres-ha-pguser-n8n
    valuesKey: pgbouncer-host
    targetPath: database.host
  - kind: Secret
    name: rfhome-postgres-ha-pguser-n8n
    valuesKey: pgbouncer-port
    targetPath: database.port
  - kind: Secret
    name: rfhome-postgres-ha-pguser-n8n
    valuesKey: user
    targetPath: database.user
  - kind: Secret
    name: rfhome-postgres-ha-pguser-n8n
    valuesKey: dbname
    targetPath: database.database
  - kind: Secret
    name: n8n-secret
    valuesKey: S3_ACCESS_KEY_ID
    targetPath: s3.auth.accessKeyId
  values:
    fullnameOverride: n8n
    image:
      repository: n8nio/n8n
      tag: 2.17.0@sha256:cd1fd0e71945cd492a61f90aab802a188015e62bf560c24d4cf752f03250076a
    secretRefs:
      existingSecret: n8n-secret
    ingress:
      enabled: true
      className: cilium
      annotations:
        external-dns: local-pdns
      hosts:
      - host: n8n.services.home.yrf.me
        paths:
        - path: /
          pathType: Prefix
    database:
      type: postgresdb
      passwordSecret:
        name: rfhome-postgres-ha-pguser-n8n
        key: password
    queueMode:
      enabled: false
    redis:
      host: redis-ha-proxy
      database: 1
      prefix: 'n8n:'
    s3:
      enabled: true
      bucket:
        name: rfhome-n8n
        region: us-east-1
        host: okinawa-s3.services.home.yrf.me
      auth:
        secretAccessKeySecret:
          name: n8n-secret
          key: S3_SECRET_ACCESS_KEY
    strategy:
      type: Recreate
    pdb:
      enabled: false
    taskRunners:
      enabled: true
      authToken:
        existingSecret: n8n-secret
        existingSecretKey: task-runner-auth-token
    persistence:
      enabled: true
      accessModes: ["ReadWriteMany"]
      size: 8Gi
      storageClassName: cephfs
      annotations:
        home.yrf.me/backup-to-okinawa-s3: "true"
    webhook:
      url: https://n8n.services.home.yrf.me
    config:
      timezone: Asia/Kuala_Lumpur
      extraEnv:
      - name: N8N_EDITOR_BASE_URL
        value: https://n8n.services.home.yrf.me
      - name: N8N_HOST
        value: n8n.services.home.yrf.me
      - name: N8N_PORT
        value: "5678"
      - name: N8N_SECURE_COOKIE
        value: "true"
      - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "true"
      - name: N8N_PROXY_HOPS
        value: "2"
    nodeSelector:
      kubernetes.io/os: linux
      location: rfhome
    priorityClassName: rfhome-standard
  postRenderers:
  - kustomize:
      patches:
      - target:
          group: apps
          version: v1
          kind: Deployment
        patch: |-
          - op: add
            path: /spec/template/spec/runtimeClassName
            value: gvisor
