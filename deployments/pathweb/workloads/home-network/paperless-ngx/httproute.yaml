---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-ngx
  namespace: home-network
  labels:
    app.kubernetes.io/name: paperless-ngx
    external-dns: local-pdns
spec:
  parentRefs:
  - name: rfhome-services-cilium
    namespace: home-network
    sectionName: https
    kind: Gateway
  hostnames:
  - paperless.services.home.yrf.me
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: paperless-ngx
      port: 8000
