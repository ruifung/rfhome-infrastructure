---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: home-assistant
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"hass-iot-network"}]'
    spec:
      priorityClassName: rfhome-home-critical
      nodeSelector:
        kubernetes.io/os: linux
        location: rfhome
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-group
                operator: In
                values: [baldric, voyager]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: home-assistant
              topologyKey: "kubernetes.io/hostname"
      automountServiceAccountToken: false
      hostUsers: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: leader-locker
        image: alpine:latest
        restartPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        command: ["/usr/local/bin/leader-locker.sh"]
        volumeMounts:
        - name: hass-data
          mountPath: /config
        - name: leader-signal
          mountPath: /signal
        - name: homeassistant-docker-venv
          mountPath: /usr/local/bin/leader-locker.sh
          subPath: leader-locker.sh
      containers:
      - name: matter-server
        image: ghcr.io/home-assistant-libs/python-matter-server:stable
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        command: ["/usr/local/bin/matter-server.sh"]
        args:
        - --storage-path
        - /data
        - --paa-root-cert-dir
        - /data/credentials
        - --primary-interface
        - net1
        - --listen-address
        - 127.0.0.1
        - --fabricid
        - "2"
        - --vendorid
        - "4939"
        volumeMounts:
        - name: hass-data
          mountPath: /data
          subPath: matter-server
        - name: leader-signal
          mountPath: /signal
        - name: homeassistant-docker-venv
          mountPath: /usr/local/bin/matter-server.sh
          subPath: matter-server.sh
      - name: home-assistant
        image: homeassistant/home-assistant:stable
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: TZ
          value: Asia/Kuala_Lumpur
        - name: HASS_DB_URI
          valueFrom:
            secretKeyRef:
              name: rfhome-postgres-ha-pguser-home-assistant
              key: pgbouncer-uri
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        envFrom:
        - secretRef:
            name: hass-secrets
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        volumeMounts:
        - name: hass-data
          mountPath: /config
        - name: hass-data
          mountPath: /venv/
          subPath: venv/
        - name: homeassistant-docker-venv
          mountPath: /etc/services.d/home-assistant/run
          subPath: venv-run
        - name: leader-signal
          mountPath: /signal
        resources:
          requests:
            cpu: 200m
            memory: 3500M
          limits:
            memory: 5Gi
        livenessProbe:
          failureThreshold: 30
          periodSeconds: 10
          exec:
            command: ["/bin/sh", "-c", "if [ -f /signal/is_leader ]; then curl -f http://$POD_IP:8123/; else exit 0; fi"]
        readinessProbe:
          failureThreshold: 30
          periodSeconds: 10
          exec:
            command: ["/bin/sh", "-c", "[ -f /signal/is_leader ] && curl -f http://$POD_IP:8123/"]
        startupProbe:
          failureThreshold: 30
          periodSeconds: 10
          exec:
            command: ["/bin/sh", "-c", "if [ -f /signal/is_leader ]; then curl -f http://$POD_IP:8123/; else exit 0; fi"]
      volumes:
      - name: hass-data
        persistentVolumeClaim:
          claimName: home-assistant-data
      - name: homeassistant-docker-venv
        configMap:
          name: homeassistant-docker-venv
          defaultMode: 0755
      - name: leader-signal
        emptyDir:
          medium: Memory
          sizeLimit: 1Mi
