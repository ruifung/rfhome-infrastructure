---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: homeassistant/home-assistant
  newName: ghcr.io/home-assistant/home-assistant
  newTag: &hass-version "2026.4.2"
- name: ghcr.io/home-assistant-libs/python-matter-server
  newTag: "8.1.0"
- name: alpine
  newTag: "3.23.3@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659"
resources:
- deployment.yaml
- service.yaml
- persistentvolumeclaim.yaml
- networkattachmentdefinition.yaml
- httproute.yaml
- ciliumnetworkpolicy.yaml
- backup-credentials.sealed.yaml
- hass-secrets.sealed.yaml
patches: []
configMapGenerator:
- name: homeassistant-docker-venv
  files:
  - venv-run
  - leader-locker.sh
  - matter-server.sh
  - ha-probe.sh
labels:
- pairs:
    app.kubernetes.io/version: *hass-version
  includeTemplates: true
  includeSelectors: false
