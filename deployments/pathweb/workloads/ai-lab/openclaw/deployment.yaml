---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      automountServiceAccountToken: false
      runtimeClassName: gvisor
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-config
        image: busybox:1.37
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          cp /config/*.json /home/node/.openclaw/
          mkdir -p /home/node/.openclaw/workspace
          cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: 32Mi
            cpu: 50m
          limits:
            memory: 64Mi
            cpu: 100m
        volumeMounts:
        - name: openclaw-home
          mountPath: /home/node/.openclaw
        - name: config
          mountPath: /config
      containers:
      - name: gateway
        image: ghcr.io/openclaw/openclaw:slim
        imagePullPolicy: IfNotPresent
        command:
        - node
        - /app/dist/index.js
        - gateway
        - run
        ports:
        - name: gateway
          containerPort: 18789
          protocol: TCP
        env:
        - name: HOME
          value: /home/node
        - name: OPENCLAW_CONFIG_DIR
          value: /home/node/.openclaw
        - name: NODE_ENV
          value: production
        envFrom:
        - secretRef:
            name: openclaw-secrets
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: "1"
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - node
            - -e
            - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: openclaw-ssh
          mountPath: /etc/openclaw-ssh
          readOnly: true
        - name: openclaw-home
          mountPath: /home/node/.openclaw
        - name: tmp-volume
          mountPath: /tmp
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: openclaw-ssh
        persistentVolumeClaim:
          claimName: openclaw-sandbox-pvc
          readOnly: true
      - name: openclaw-home
        persistentVolumeClaim:
          claimName: openclaw-home-pvc
      - name: config
        configMap:
          name: openclaw-config
      - name: tmp-volume
        emptyDir: {}
