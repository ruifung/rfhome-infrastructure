---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- pvc.yaml
- deployment.yaml
- service.yaml
- openclaw-secrets.sealed.yaml
- httproute.yaml
- ciliumnetworkpolicy.yaml
configMapGenerator:
- name: openclaw-config
  files:
  - openclaw.json=config/openclaw.json5
  - telegram-channel.json=config/telegram-channel.json5
  - AGENTS.md=config/AGENTS.md
commonLabels:
  app.kubernetes.io/name: openclaw
  app.kubernetes.io/instance: openclaw
images:
- name: ghcr.io/openclaw/openclaw
  newTag: 2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
