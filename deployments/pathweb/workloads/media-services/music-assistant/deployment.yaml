---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-assistant
  namespace: media-services
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: music-assistant
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: music-assistant
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"music-assistant-iot-network"}]'
    spec:
      priorityClassName: rfhome-home-critical
      nodeSelector:
        kubernetes.io/os: linux
        location: rfhome
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-group
                operator: In
                values: [baldric, voyager]
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: update-settings
        image: mikefarah/yq:4
        command: ["sh"]
        args:
        - -c
        - |
          if [ -f /data/settings.json ]; then
            yq -i -o json '.core.webserver.values.bind_ip = env(POD_IP)' /data/settings.json
          fi
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: mass-data
          mountPath: /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      containers:
      - name: music-assistant
        image: ghcr.io/music-assistant/server:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: TZ
          value: Asia/Kuala_Lumpur
        ports:
        - containerPort: 8095
          name: http
          protocol: TCP
        - containerPort: 8097
          name: streaming
          protocol: TCP
        volumeMounts:
        - name: mass-data
          mountPath: /data
        - name: media
          mountPath: /mnt/media/Music
          subPath: Music
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        livenessProbe:
          tcpSocket:
            port: 8095
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8095
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: mass-data
        persistentVolumeClaim:
          claimName: music-assistant-data
      - name: media
        persistentVolumeClaim:
          claimName: okinawa-media-nfs
