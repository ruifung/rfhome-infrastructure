---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slzb-ultima-wg
  namespace: home-network-privileged
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: slzb-ultima-wg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: slzb-ultima-wg
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"slzb-ultima-wg-iot-network"}]'
    spec:
      priorityClassName: rfhome-home-critical
      nodeSelector:
        kubernetes.io/os: linux
        location: rfhome
      automountServiceAccountToken: false
      hostUsers: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: wg-init
        image: lscr.io/linuxserver/wireguard:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          wg-quick up /etc/wireguard/wg0.conf
          if [ -f /data/wg0_endpoints.txt ]; then
            while read -r pubkey endpoint; do
              if [ ! -z "$pubkey" ] && [ "$endpoint" != "(none)" ] && [ ! -z "$endpoint" ]; then
                echo "Restoring peer $pubkey to endpoint $endpoint"
                wg set wg0 peer "$pubkey" endpoint "$endpoint" || true
              fi
            done < /data/wg0_endpoints.txt
          fi
        securityContext:
          runAsUser: 0
          capabilities:
            add:
            - NET_ADMIN
        resources:
          limits:
            cpu: 10m
            memory: 16Mi
          requests:
            cpu: 1m
            memory: 8Mi
        volumeMounts:
        - name: wireguard-config
          mountPath: /etc/wireguard
        - name: slzb-ultima-wg-data
          mountPath: /data
      - name: wg-monitor
        image: lscr.io/linuxserver/wireguard:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          save_and_exit() {
            echo "SIGTERM received. Saving final endpoints before exiting..."
            if wg show wg0 endpoints | grep -v -E '\(none\)|^$' > /dev/null 2>&1; then
              wg show wg0 endpoints | grep -v -E '\(none\)|^$' > /data/wg0_endpoints.tmp
              mv /data/wg0_endpoints.tmp /data/wg0_endpoints.txt
            fi
            exit 0
          }

          trap save_and_exit SIGTERM SIGINT

          while true; do
            echo "=== $(date): wg0 status ==="
            wg show wg0 || true

            # Save active endpoints (exclude '(none)')
            if wg show wg0 endpoints | grep -v -E '\(none\)|^$' > /dev/null 2>&1; then
              wg show wg0 endpoints | grep -v -E '\(none\)|^$' > /data/wg0_endpoints.tmp
              mv /data/wg0_endpoints.tmp /data/wg0_endpoints.txt
            fi

            sleep 60 &
            wait $!
          done
        securityContext:
          runAsUser: 0
          capabilities:
            add:
            - NET_ADMIN
        resources:
          limits:
            cpu: 10m
            memory: 16Mi
          requests:
            cpu: 1m
            memory: 8Mi
        restartPolicy: Always
        volumeMounts:
        - name: slzb-ultima-wg-data
          mountPath: /data
      containers:
      - name: proxy-radio1
        image: alpine/socat:latest
        args:
        - TCP-LISTEN:6638,fork,reuseaddr
        - TCP:192.168.229.2:6638
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 6638
          name: radio1
          protocol: TCP
        resources:
          limits:
            cpu: 10m
            memory: 16Mi
          requests:
            cpu: 1m
            memory: 8Mi
        livenessProbe:
          tcpSocket:
            port: 6638
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6638
          initialDelaySeconds: 5
          periodSeconds: 10
      - name: proxy-radio2
        image: alpine/socat:latest
        args:
        - TCP-LISTEN:7638,fork,reuseaddr
        - TCP:192.168.229.2:7638
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 7638
          name: radio2
          protocol: TCP
        resources:
          limits:
            cpu: 10m
            memory: 16Mi
          requests:
            cpu: 1m
            memory: 8Mi
        livenessProbe:
          tcpSocket:
            port: 7638
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 7638
          initialDelaySeconds: 5
          periodSeconds: 10
      - name: proxy-http
        image: alpine/socat:latest
        args:
        - TCP-LISTEN:80,fork,reuseaddr
        - TCP:192.168.229.2:80
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: 10m
            memory: 16Mi
          requests:
            cpu: 1m
            memory: 8Mi
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: wireguard-config
        secret:
          secretName: slzb-ultima-wg-secrets
      - name: slzb-ultima-wg-data
        persistentVolumeClaim:
          claimName: slzb-ultima-wg-data
